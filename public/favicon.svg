<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Galaxy background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d0030"/>
      <stop offset="100%" stop-color="#02010a"/>
    </radialGradient>
    <!-- Black hole core -->
    <radialGradient id="bh" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#000000"/>
      <stop offset="55%" stop-color="#000000"/>
      <stop offset="70%" stop-color="#6b21ff" stop-opacity="0.9"/>
      <stop offset="85%" stop-color="#4f00cc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Accretion disc glow -->
    <radialGradient id="disc" cx="38%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#c084fc" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#f97316" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Nebula cloud -->
  <ellipse cx="8"  cy="10" rx="7" ry="5" fill="#5b21b6" opacity="0.18"/>
  <ellipse cx="24" cy="22" rx="6" ry="4" fill="#1e3a8a" opacity="0.15"/>

  <!-- Stars -->
  <circle cx="4"  cy="5"  r="0.6" fill="white" opacity="0.9"/>
  <circle cx="28" cy="4"  r="0.5" fill="white" opacity="0.8"/>
  <circle cx="27" cy="12" r="0.4" fill="#ddd6fe" opacity="0.9"/>
  <circle cx="3"  cy="20" r="0.5" fill="white" opacity="0.7"/>
  <circle cx="6"  cy="27" r="0.4" fill="white" opacity="0.85"/>
  <circle cx="29" cy="25" r="0.6" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="14" cy="3"  r="0.4" fill="white" opacity="0.9"/>
  <circle cx="22" cy="29" r="0.5" fill="white" opacity="0.7"/>
  <circle cx="25" cy="7"  r="0.35" fill="#e9d5ff" opacity="0.9"/>
  <circle cx="2"  cy="14" r="0.4" fill="white" opacity="0.75"/>

  <!-- Accretion disc (ellipse behind core) -->
  <ellipse cx="16" cy="16" rx="9" ry="3.5" fill="url(#disc)" opacity="0.85" transform="rotate(-20 16 16)" filter="url(#glow)"/>

  <!-- Black hole -->
  <circle cx="16" cy="16" r="6.5" fill="url(#bh)" filter="url(#glow)"/>

  <!-- Hot spot on disc -->
  <ellipse cx="13" cy="15" rx="3" ry="1.2" fill="#e879f9" opacity="0.55" transform="rotate(-20 13 15)" filter="url(#glow)"/>
</svg>
